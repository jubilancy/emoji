name: Deploy Emoji Gallery
on:
  push:
    branches:
      - main
    paths:
      - 'emojis.txt'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate emojis.txt format
        run: |
          if [ ! -f emojis.txt ]; then echo "emojis.txt not found!"; exit 1; fi
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -z "$line" ]; then continue; fi
            if [[ ! "$line" =~ \| ]]; then echo "Invalid line: $line"; exit 1; fi
          done < emojis.txt
          echo "✓ emojis.txt valid"

      - name: Ensure index.html exists
        run: |
          if [ ! -f index.html ]; then echo "index.html not found!"; exit 1; fi
          echo "✓ index.html found"

      - name: Build site folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp emojis.txt _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🎉 Emoji Gallery Deployed!" >> $GITHUB_STEP_SUMMARY
          EMOJI_COUNT=$(grep -c '|' emojis.txt 2>/dev/null || echo "unknown")
          echo "**Total emojis:** $EMOJI_COUNT" >> $GITHUB_STEP_SUMMARY
